<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Scale layout correctly on phones and tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grauer Hall Check-In</title>
    <!-- Warm up connections to Google Fonts before the stylesheet loads -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- UI fonts: DM Sans for body text, Instrument Serif for headings -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React-free mount point; check-in UI is rendered here by main.js -->
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
